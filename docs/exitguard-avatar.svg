<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- ExitGuard marketplace avatar — the BLOCK/WARN/OK annunciator over an exit-depth trace on the
       instrument-grade terminal panel. All fills are SOLID (pre-blended over #090c11) so it rasterises
       identically in ImageMagick / any renderer — no opacity or gradients. -->

  <!-- panel -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="#090c11"/>
  <rect x="9.5" y="9.5" width="493" height="493" rx="102.5" fill="none" stroke="#202a36" stroke-width="3"/>

  <!-- faint oscilloscope grid -->
  <g stroke="#161d27" stroke-width="2">
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
  </g>

  <!-- exit-depth area (subtle dark-teal fill = 6% cyan over panel) + bright cyan trace on top -->
  <path d="M96 150 C 180 158, 232 176, 268 214 C 300 248, 316 300, 330 372 L 330 430 L 96 430 Z"
        fill="#0b181e"/>
  <path d="M96 150 C 180 158, 232 176, 268 214 C 300 248, 316 300, 330 372"
        fill="none" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>

  <!-- annunciator lamps (standby dim → BLOCK live), right column -->
  <!-- OK (green, standby) -->
  <circle cx="392" cy="132" r="30" fill="#13442e"/>
  <circle cx="392" cy="132" r="14" fill="#1c7046"/>
  <!-- WARN (amber, standby) -->
  <circle cx="392" cy="256" r="30" fill="#4e3a15"/>
  <circle cx="392" cy="256" r="14" fill="#845e19"/>
  <!-- BLOCK (red, live) — layered solid "glow" -->
  <circle cx="392" cy="384" r="58" fill="#2b1319"/>
  <circle cx="392" cy="384" r="46" fill="#3f161d"/>
  <circle cx="392" cy="384" r="34" fill="#ff3b47"/>
  <circle cx="392" cy="384" r="34" fill="none" stroke="#ff6b73" stroke-width="2"/>
  <!-- BLOCK stop bar (panel-dark cutout = a stop/minus) -->
  <rect x="374" y="379.5" width="36" height="9" rx="4.5" fill="#090c11"/>
</svg>
